<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Advanced Matrix Calculator - Perform complex matrix operations with step-by-step solutions. Perfect for students and engineers.">
    <title>Nikhil's Matrix Lab| Advanced Matrix Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.10.0/math.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-area">
                <i class="fas fa-table-cells logo-icon" aria-hidden="true"></i>
                <div>
                    <h1>Nikhil's Matrix Lab<span class="accent">.</span></h1>
                    <p class="tagline">Smart Linear Algebra Toolkit</p>
                </div>
            </div>
            <div class="header-controls">
                <div class="step-toggle-group">
                    <span class="toggle-label" id="stepModeLabel"><i class="fas fa-code-branch" aria-hidden="true"></i> Step-by-Step</span>
                    <label class="switch">
                        <input type="checkbox" id="stepModeToggle" aria-labelledby="stepModeLabel">
                        <span class="slider round"></span>
                    </label>
                </div>
                <button type="button" id="themeToggleBtn" class="icon-btn" aria-label="Toggle dark or light mode">
                    <i class="fas fa-moon" aria-hidden="true"></i>
                </button>
            </div>
        </header>

        <main class="main-dashboard">
            <div class="matrices-panel">
                <div class="matrix-card glass-card">
                    <div class="matrix-card-header">
                        <h2><i class="fas fa-square" aria-hidden="true"></i> Matrix A</h2>
                        <div class="dimension-controls">
                            <div class="dim-control">
                                <label for="rowsA">Rows</label>
                                <input type="number" id="rowsA" min="1" max="6" value="3" step="1" inputmode="numeric">
                            </div>
                            <div class="dim-control">
                                <label for="colsA">Cols</label>
                                <input type="number" id="colsA" min="1" max="6" value="3" step="1" inputmode="numeric">
                            </div>
                            <button type="button" id="buildMatrixA" class="btn-outline small"><i class="fas fa-sync-alt" aria-hidden="true"></i> Build</button>
                        </div>
                    </div>
                    <div id="matrixAContainer" class="matrix-grid-container"></div>
                    <div class="matrix-actions">
                        <button type="button" id="setIdentityA" class="btn-ghost small"><i class="fas fa-eye" aria-hidden="true"></i> Identity</button>
                        <button type="button" id="setZeroA" class="btn-ghost small"><i class="fas fa-ban" aria-hidden="true"></i> Zero</button>
                    </div>
                </div>

                <div class="matrix-card glass-card">
                    <div class="matrix-card-header">
                        <h2><i class="fas fa-border-all" aria-hidden="true"></i> Matrix B</h2>
                        <div class="dimension-controls">
                            <div class="dim-control">
                                <label for="rowsB">Rows</label>
                                <input type="number" id="rowsB" min="1" max="6" value="3" step="1" inputmode="numeric">
                            </div>
                            <div class="dim-control">
                                <label for="colsB">Cols</label>
                                <input type="number" id="colsB" min="1" max="6" value="3" step="1" inputmode="numeric">
                            </div>
                            <button type="button" id="buildMatrixB" class="btn-outline small"><i class="fas fa-sync-alt" aria-hidden="true"></i> Build</button>
                        </div>
                    </div>
                    <div id="matrixBContainer" class="matrix-grid-container"></div>
                    <div class="matrix-actions">
                        <button type="button" id="setIdentityB" class="btn-ghost small"><i class="fas fa-eye" aria-hidden="true"></i> Identity</button>
                        <button type="button" id="setZeroB" class="btn-ghost small"><i class="fas fa-ban" aria-hidden="true"></i> Zero</button>
                    </div>
                </div>
            </div>

            <div class="operations-panel">
                <div class="ops-categories">
                    <div class="ops-group">
                        <h3><i class="fas fa-calculator" aria-hidden="true"></i> Basic</h3>
                        <div class="btn-group">
                            <button type="button" data-op="add" class="op-btn">A + B</button>
                            <button type="button" data-op="sub" class="op-btn">A - B</button>
                            <button type="button" data-op="mul" class="op-btn">A &times; B</button>
                            <button type="button" data-op="scalar" class="op-btn">Scalar &times; A</button>
                            <button type="button" data-op="transpose" class="op-btn">A<sup>T</sup></button>
                        </div>
                    </div>
                    <div class="ops-group">
                        <h3><i class="fas fa-chart-line" aria-hidden="true"></i> Intermediate</h3>
                        <div class="btn-group">
                            <button type="button" data-op="det" class="op-btn">det(A)</button>
                            <button type="button" data-op="inv" class="op-btn">A<sup>-1</sup></button>
                            <button type="button" data-op="trace" class="op-btn">trace(A)</button>
                            <button type="button" data-op="rank" class="op-btn">rank(A)</button>
                            <button type="button" data-op="minor" class="op-btn">Minor (i,j)</button>
                            <button type="button" data-op="cofactor" class="op-btn">Cofactor</button>
                            <button type="button" data-op="adjoint" class="op-btn">Adjoint(A)</button>
                        </div>
                    </div>
                    <div class="ops-group">
                        <h3><i class="fas fa-microchip" aria-hidden="true"></i> Advanced</h3>
                        <div class="btn-group">
                            <button type="button" data-op="ref" class="op-btn">REF (A)</button>
                            <button type="button" data-op="rref" class="op-btn">RREF (A)</button>
                            <button type="button" data-op="gauss_solve" class="op-btn">Solve Ax = b</button>
                            <button type="button" data-op="power" class="op-btn">A<sup>n</sup></button>
                            <button type="button" data-op="matrixDiv" class="op-btn">A / B</button>
                            <button type="button" data-op="lu" class="op-btn">LU Decomp</button>
                        </div>
                    </div>
                    <div class="ops-group">
                        <h3><i class="fas fa-atom" aria-hidden="true"></i> Linear Algebra</h3>
                        <div class="btn-group">
                            <button type="button" data-op="eigen" class="op-btn">Eigenvalues</button>
                            <button type="button" data-op="eigenvectors" class="op-btn">Eigenvectors</button>
                            <button type="button" data-op="diag" class="op-btn">Diagonalizable?</button>
                            <button type="button" data-op="charpoly" class="op-btn">Char. Polynomial</button>
                        </div>
                    </div>
                    <div class="ops-group">
                        <h3><i class="fas fa-check-double" aria-hidden="true"></i> Analysis & Checks</h3>
                        <div class="btn-group">
                            <button type="button" data-op="isSymmetric" class="op-btn">Symmetric?</button>
                            <button type="button" data-op="isSkew" class="op-btn">Skew-Sym?</button>
                            <button type="button" data-op="isOrthogonal" class="op-btn">Orthogonal?</button>
                            <button type="button" data-op="isSingular" class="op-btn">Singular?</button>
                            <button type="button" data-op="isPosDef" class="op-btn">Pos. Definite?</button>
                        </div>
                    </div>
                </div>

                <div class="result-area glass-card">
                    <div class="result-header">
                        <h3><i class="fas fa-microchip" aria-hidden="true"></i> Output</h3>
                        <div id="loadingIndicator" class="loading-badge hidden"><i class="fas fa-spinner fa-pulse" aria-hidden="true"></i> Computing...</div>
                    </div>
                    <div id="resultDisplay" class="result-box" aria-live="polite">
                        <p class="placeholder-text">Ready. Select an operation.</p>
                    </div>
                    <div id="stepsDisplay" class="steps-box">
                        <div class="steps-header"><i class="fas fa-list-ol" aria-hidden="true"></i> Step-by-step</div>
                        <div id="stepsContent" class="steps-content">Click toggle to enable step mode.</div>
                    </div>
                    <div id="errorBox" class="error-message hidden" role="alert"></div>
                </div>
            </div>
        </main>
        <footer class="app-footer">
            <center><span>Designed & Developed by Nikhil © 2026</span></center>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
